version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ems-postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ramesh@04
      POSTGRES_DB: loginapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ems-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DB_USER=postgres
      - DB_HOST=db
      - DB_NAME=loginapp
      - DB_PASSWORD=Ramesh@04
      - DB_PORT=5432
      - JWT_SECRET=ems_2026_secure_jwt_dev
      - DATABASE_URL=postgresql://postgres:Ramesh@04@db:5432/loginapp
      - BACKEND_URL=http://localhost:5000
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000/api
    container_name: ems-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
